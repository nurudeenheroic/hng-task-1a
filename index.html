<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./editForm.css">
    <title>TASK CARD</title>
</head>
<body>
    <section role="region" class="card-container" data-testid="test-todo-card">
        <h2 class="task-title" data-testid="test-todo-title">
            Read a Novel
        </h2>
        <p class="description" data-testid="test-todo-description">
            Read a novel for 30 minutes every day.
        </p>
        <ul role="list" data-testid="test-todo-tags" class="list">
            <li class="tag" data-testid="test-todo-tag-urgent">
                Reading
            </li>
            <li class="tag" data-testid="test-todo-tag-urgent">
                Leisure
            </li>
        </ul>
        <p class="priority-status">
            <span >
                <span>
                    <input type="checkbox" name="" id="" class="checkbox"  data-testid="test-todo-complete-toggle">
                </span>
                <span>
                Status:
                    <span class="status" data-testid="test-todo-status"> In Progress</span>
                </span>
            </span>
            <span>
                Priority:
                <span class="priority" data-testid="test-todo-priority"> High
                </span>
            </span>
        </p>
        <p class="due">
            <time class="due-date" data-testid="test-todo-due-date">
                Due: April 18,2026
            </time>
            <time class="due-time" data-testid="test-todo-time-remaining">
                Time remaining: 2 days
            </time>
        </p>
        <div class="buttons">
            <button class="edit-button" data-testid="test-edit-button">Edit</button>
            <button class="delete-button" data-testid="test-delete-button">Delete</button>
        </div>
    </section>
    <script src="./index.js">
    </script>
</body>
</html>
